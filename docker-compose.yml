services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: techiefinder
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=jdbc:mysql://mysql:3306/techiefinder
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-password}
      - JWT_SECRET=${JWT_SECRET:-TechieFinderDevOnlySecretKeyForJWTHS512SigningRequiresAtLeast64ByteLongKey}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@techiefinder.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ChangeMe123!}
      - PAYMENT_GATEWAY_PROVIDER=${PAYMENT_GATEWAY_PROVIDER:-wallet}
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY:-}
      - PAYSTACK_PUBLIC_KEY=${PAYSTACK_PUBLIC_KEY:-}
      - FLUTTERWAVE_SECRET_KEY=${FLUTTERWAVE_SECRET_KEY:-}
      - FLUTTERWAVE_PUBLIC_KEY=${FLUTTERWAVE_PUBLIC_KEY:-}
      - FLUTTERWAVE_WEBHOOK_SECRET_HASH=${FLUTTERWAVE_WEBHOOK_SECRET_HASH:-}
      - EMAIL_USERNAME=${EMAIL_USERNAME:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      - SMS_API_KEY=${SMS_API_KEY:-}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - APPLE_OAUTH_CLIENT_ID=${APPLE_OAUTH_CLIENT_ID:-}
      - APPLE_OAUTH_BUNDLE_ID=${APPLE_OAUTH_BUNDLE_ID:-}
      # Passthrough form (no default): omitted from the container entirely if
      # unset in .env, so Spring's own property defaults apply. A mapped
      # "VAR=${VAR:-}" would instead pass an explicit empty string, which wins
      # over Spring's colon-default and breaks the safe-fallback behavior for
      # these two specifically (see PushNotificationClient, PaymentService).
      - PAYMENT_CALLBACK_URL
      - FIREBASE_CONFIG_PATH
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/var/techiefinder/uploads

  web:
    build:
      context: ./web
      args:
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
        - VITE_APPLE_CLIENT_ID=${APPLE_OAUTH_CLIENT_ID:-}
        - VITE_APPLE_REDIRECT_URI=${APPLE_OAUTH_REDIRECT_URI:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mysql_data:
  uploads_data:

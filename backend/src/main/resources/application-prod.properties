# Production Configuration

# Database Configuration (MySQL)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/techiefinder}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration - JWT_SECRET must be set in production; this default is dev-only
# and must never be relied on outside local development.
jwt.secret=${JWT_SECRET:TechieFinderDevOnlySecretKeyForJWTHS512SigningRequiresAtLeast64ByteLongKey}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# File Upload Configuration
file.upload.dir=${FILE_UPLOAD_DIR:/var/techiefinder/uploads}

# H2 Console (Disabled in production)
spring.h2.console.enabled=false

# Logging Configuration
logging.level.com.techiefinder=INFO
logging.level.org.springframework.security=WARN
logging.file.name=/var/log/techiefinder/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# SSL Configuration (if using HTTPS)
server.ssl.enabled=false

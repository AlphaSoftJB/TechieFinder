# Application Configuration
spring.application.name=TechieFinder
server.port=8080

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:techiefinder
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# Dev-only default secret; override with JWT_SECRET in any real environment. Must be
# at least 64 bytes (512 bits) since tokens are signed with HS512.
jwt.secret=${JWT_SECRET:TechieFinderDevOnlySecretKeyForJWTHS512SigningRequiresAtLeast64ByteLongKey}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.dir=${FILE_UPLOAD_DIR:./uploads}

# CORS Configuration
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}

# Default Admin Account (seeded on first startup if it doesn't already exist)
# Dev-only defaults; override with ADMIN_EMAIL/ADMIN_PASSWORD in any real environment.
admin.default.email=${ADMIN_EMAIL:admin@techiefinder.com}
admin.default.password=${ADMIN_PASSWORD:ChangeMe123!}

# Payment Gateway Configuration
paystack.secret.key=${PAYSTACK_SECRET_KEY:sk_test_your_paystack_secret_key}
paystack.public.key=${PAYSTACK_PUBLIC_KEY:pk_test_your_paystack_public_key}
paystack.api.url=https://api.paystack.co

flutterwave.secret.key=${FLUTTERWAVE_SECRET_KEY:FLWSECK_TEST-your_flutterwave_secret_key}
flutterwave.public.key=${FLUTTERWAVE_PUBLIC_KEY:FLWPUBK_TEST-your_flutterwave_public_key}
flutterwave.api.url=https://api.flutterwave.com/v3
flutterwave.webhook.secret.hash=${FLUTTERWAVE_WEBHOOK_SECRET_HASH:}

# Which real gateway (if any) PaymentService checks out through. "wallet" (the
# default) keeps the instant simulated settlement; set to "paystack" or
# "flutterwave" once the matching *.secret.key above is a real key.
payment.gateway.provider=${PAYMENT_GATEWAY_PROVIDER:wallet}
payment.gateway.callback.url=${PAYMENT_CALLBACK_URL:http://localhost:3000/payments/callback}

# Firebase Configuration
firebase.config.path=${FIREBASE_CONFIG_PATH:classpath:firebase-service-account.json}

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# SMS Configuration
sms.api.key=${SMS_API_KEY:your-sms-api-key}
sms.api.url=https://api.ng.termii.com/api/sms/send

# Google Maps API
google.maps.api.key=${GOOGLE_MAPS_API_KEY:your-google-maps-api-key}

# Social sign-in (Google/Apple). Blank = disabled -- the /api/auth/social/*
# endpoints return a clear 400 instead of a broken login, and both frontends
# hide their sign-in buttons when their own client-id env vars are unset.
# The web/mobile client ID is not a secret; the same value must be configured
# on both sides since the backend checks it as the token's audience.
google.oauth.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
# Apple's ID token audience is the web Service ID for the JS SDK flow and the
# app's bundle identifier for native (expo-apple-authentication) sign-in --
# either satisfies the backend's audience check.
apple.oauth.client-id=${APPLE_OAUTH_CLIENT_ID:}
apple.oauth.bundle-id=${APPLE_OAUTH_BUNDLE_ID:}

# Logging Configuration
logging.level.com.techiefinder=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # React Router client-side routes -- fall back to index.html for anything
    # that isn't a real static asset.
    location / {
        try_files $uri /index.html;
    }
}
